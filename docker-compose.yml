# docker-compose.yml - Infraestrutura de Proxy Nginx
# Removeu a versão obsoleta e ciclo de dependência

services:
  # Container do site de boas-vindas (Nginx)
  welcome-site:
    image: nginx:alpine
    container_name: proxy-welcome-site
    restart: unless-stopped
    ports:
      - "8080:80"  # Porta interna para acesso direto ao site
    volumes:
      - ./config/welcome-site.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/html:/usr/share/nginx/html:ro
    networks:
      - proxy-network

  # Container Proxy Nginx Principal
  proxy:
    image: nginx:alpine
    container_name: proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./config/proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - proxy-network

networks:
  proxy-network:
    driver: bridge
