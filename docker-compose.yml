# docker-compose.yml - Infraestrutura de Proxy Nginx (HTTPS + Let's Encrypt)

version: '3.8'

services:
  # Container do site de boas-vindas (Nginx)
  welcome-site:
    image: nginx:alpine
    container_name: proxy-welcome-site
    restart: unless-stopped
    ports:
      - "8080:80"  # Porta interna para acesso direto ao site
    volumes:
      - ./config/welcome-site.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/html:/usr/share/nginx/html:ro
    networks:
      - proxy-network

  # Container Proxy Nginx Principal (HTTPS + Let's Encrypt)
  proxy:
    image: nginx:alpine
    container_name: proxy
    restart: unless-stopped
    ports:
      - "443:443"  # HTTPS (porta 443)
      - "80:80"    # HTTP (redirecionamento para HTTPS)
    volumes:
      - ./config/proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./certs/live:/etc/nginx/certs/live:ro
    networks:
      - proxy-network
    extra_hosts:
      - "openclaw.jpbx.com.br:host-gateway"

networks:
  proxy-network:
    driver: bridge
