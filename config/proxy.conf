# Configuração do Nginx - Proxy Principal
# IP Público: 201.54.20.4
# Redireciona o tráfego para o site de boas-vindas

server {
    listen 80;
    listen [::]:80;
    server_name 201.54.20.4;

    # Logs
    access_log /var/log/nginx/proxy_access.log;
    error_log /var/log/nginx/proxy_error.log info;

    # Redirecionar todo tráfego HTTP para HTTPS (301 permanente)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name openclaw.jpbx.com.br;

    # Certificados SSL (Let's Encrypt)
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    
    # Configurações Modernas de Segurança
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    
    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Logs
    access_log /var/log/nginx/proxy_access.log;
    error_log /var/log/nginx/proxy_error.log info;

    # Location para servir o site de boas-vindas
    location / {
        # Proxy para o container do welcome-site na mesma rede Docker
        proxy_pass http://proxy-welcome-site:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeout para upstream
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Cabeçalhos de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
