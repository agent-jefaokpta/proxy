# Configuração do Nginx - Site de Boas-vindas

server {
    listen 8080;
    listen [::]:8080;
    server_name localhost;

    # Logs
    access_log /var/log/nginx/welcome-site_access.log;
    error_log /var/log/nginx/welcome-site_error.log;

    # Configuração para servir arquivos estáticos
    root /usr/share/nginx/html;
    index welcome.html;

    location / {
        # Serve arquivos estáticos e redireciona para welcome.html se não existir
        try_files $uri $uri/ /welcome.html;
    }

    # Cabeçalhos seguros
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
